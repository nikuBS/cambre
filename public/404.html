<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA 라우팅 처리
      var base = '/cambre';
      var path = window.location.pathname.replace(base, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = base + '/?p=' + encodeURIComponent(path.slice(1)) + (search ? '&q=' + search.slice(1) : '') + hash;
      window.location.replace(redirect);
    </script>
  </head>
</html>
